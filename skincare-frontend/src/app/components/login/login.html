<div class="auth-page">
  <div class="auth-container">

    <!-- Left Panel -->
    <div class="auth-left">
      <div class="brand">
        <span class="logo">🌸</span>
        <h1>GlowSkin</h1>
      </div>
      <p class="tagline">Your journey to radiant skin starts here</p>
      <div class="features">
        <div class="feature"><span>✨</span><p>Premium Skin Care</p></div>
        <div class="feature"><span>🌿</span><p>Natural Ingredients</p></div>
        <div class="feature"><span>💧</span><p>Deep Hydration</p></div>
      </div>
      <div class="decorative-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-right">
      <div class="auth-card">

        <div class="card-header">
          <h2>Welcome Back! 👋</h2>
          <p class="subtitle">Sign in to continue to GlowSkin</p>
        </div>

        <div class="error-msg" *ngIf="errorMsg">
          ⚠️ {{ errorMsg }}
        </div>

        <div class="form-group">
          <label>Email Address</label>
          <div class="input-wrapper">
            <span class="input-icon">📧</span>
            <input [(ngModel)]="email"
                   type="email"
                   placeholder="Enter your email"
                   class="auth-input"
                   (keyup.enter)="login()" />
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input [(ngModel)]="password"
                   [type]="showPassword ? 'text' : 'password'"
                   placeholder="Enter your password"
                   class="auth-input"
                   (keyup.enter)="login()" />
            <span class="toggle-pass" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁️' }}
            </span>
          </div>
        </div>

        <button class="auth-btn" (click)="login()">
          Sign In →
        </button>

        <div class="divider"><span>or</span></div>

        <p class="switch-auth">
          Don't have an account?
          <a routerLink="/register">Create Account</a>
        </p>

        <div class="admin-hint">
          🔐 Admins can log in here too
        </div>

      </div>
    </div>

  </div>
</div>
