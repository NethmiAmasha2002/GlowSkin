<div class="admin-login-page">
  <div class="login-card">
 
    <div class="login-header">
      <div class="admin-logo">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="19" fill="url(#ag)"/>
          <path d="M20 8C20 8,14 14,14 18.5C14 21.5,16.5 24,20 24C23.5 24,26 21.5,26 18.5C26 14 20 8 20 8Z" fill="white" opacity="0.9"/>
          <defs>
            <linearGradient id="ag" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#c97b9b"/>
              <stop offset="100%" stop-color="#6a1040"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1>GlowSkin Admin</h1>
      <p>Sign in to manage your store</p>
    </div>
 
    <div class="error-msg" *ngIf="error">⚠️ {{error}}</div>
 
    <div class="form-group">
      <label>Admin Email</label>
      <input type="email" [(ngModel)]="email"
             placeholder="admin@glowskin.com"
             class="form-input" (keyup.enter)="login()">
    </div>
 
    <div class="form-group">
      <label>Password</label>
      <div class="pass-wrap">
        <input [type]="showPass ? 'text' : 'password'"
               [(ngModel)]="password"
               placeholder="Enter admin password"
               class="form-input" (keyup.enter)="login()">
        <span class="toggle-pass" (click)="showPass=!showPass">
          {{showPass ? '🙈' : '👁️'}}
        </span>
      </div>
    </div>
 
    <button class="login-btn" (click)="login()">
      Sign In as Admin →
    </button>
 
    <div class="hint-box">
      <strong>Demo Credentials:</strong><br>
      Email: admin&#64;glowskin.com<br>
      Password: admin123
    </div>
 
  </div>
</div>
